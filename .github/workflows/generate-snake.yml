name: Generate Snake Contribution Grid

on:
  schedule:
    # Run every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Also run on every push to master/main
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user contributions graph, output a svg animation
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff003c&color_dots=#161b22,#3e0010,#70001e,#ad002e,#ff003c
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff003c&color_dots=#0d1117,#2d000a,#560013,#8b0020,#e50036

      # Push the content of <build_dir> to a branch
      # The content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file>
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
