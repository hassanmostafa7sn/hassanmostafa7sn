<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 80" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-footer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020204"/>
      <stop offset="50%" stop-color="#090306"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>
    
    <filter id="neon-glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .pulsing-bar { animation: pulse-opacity 3s infinite ease-in-out; }
    
    .footer-text {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
      font-weight: 500;
      fill: #8e8e9f;
      letter-spacing: 3px;
    }
    .accent-red {
      fill: #ff003c;
    }
  </style>

  <!-- Background -->
  <rect width="830" height="80" fill="url(#bg-grad-footer)" />
  
  <!-- Framing Line -->
  <line x1="20" y1="10" x2="810" y2="10" stroke="#ff003c" stroke-width="1" stroke-opacity="0.25" />
  
  <!-- Tech Ornaments -->
  <g transform="translate(20, 20)">
    <!-- Tech Crosses -->
    <path d="M-5 0 L5 0 M0 -5 L0 5" stroke="#ff003c" stroke-width="1" stroke-opacity="0.4" />
    <!-- Small Blocks -->
    <rect x="20" y="-3" width="6" height="6" fill="#ff003c" class="pulsing-bar" />
    <rect x="32" y="-3" width="15" height="1" fill="#ffffff" opacity="0.4" />
  </g>

  <g transform="translate(810, 20)">
    <!-- Tech Crosses -->
    <path d="M-5 0 L5 0 M0 -5 L0 5" stroke="#ff003c" stroke-width="1" stroke-opacity="0.4" />
    <!-- Small Blocks -->
    <rect x="-26" y="-3" width="6" height="6" fill="#ffffff" opacity="0.5" />
  </g>

  <!-- Centered Footer Text -->
  <text x="415" y="45" text-anchor="middle" class="footer-text">
    <tspan class="accent-red">//</tspan> COGNITIVE COMPUTATION SYSTEM ACTIVE <tspan class="accent-red">//</tspan> SECURE NODE
  </text>
  
  <text x="415" y="62" text-anchor="middle" class="footer-text" font-size="8" fill-opacity="0.5" fill="#5c5c6d">
    HASSAN MOSTAFA © 2026. ALL RIGHTS RESERVED.
  </text>
  
  <!-- Left Decorative Bar -->
  <rect x="150" y="42" width="60" height="1" fill="#ff003c" opacity="0.2" />
  <!-- Right Decorative Bar -->
  <rect x="620" y="42" width="60" height="1" fill="#ff003c" opacity="0.2" />
</svg>
